<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneig de Bàdminton</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<header>
  <h1>🏸 <span id="tournamentTitle">Torneig de Bàdminton del Club</span></h1>
  <button id="editTitleBtn" class="link-btn"></button>
  <div class="header-actions">
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="ca">CA</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
    <button id="exportBtn" class="secondary export-btn"></button>
  </div>
</header>

<div class="privacy-note" id="privacyNote"></div>

<nav class="tabs">
  <button class="tab-btn active" data-tab="players" id="tabPlayersBtn"></button>
  <button class="tab-btn" data-tab="schedule" id="tabScheduleBtn"></button>
  <button class="tab-btn" data-tab="rankings" id="tabRankingsBtn"></button>
</nav>

<main>

  <!-- PLAYERS TAB -->
  <section id="players" class="tab-panel active">
    <div class="card">
      <h2 id="addPlayerHeading"></h2>
      <form id="addPlayerForm" class="inline-form">
        <input type="text" id="playerName" required>
        <select id="playerLevel" required>
          <option value="1" id="addLevelOpt1"></option>
          <option value="2" id="addLevelOpt2" selected></option>
          <option value="3" id="addLevelOpt3"></option>
        </select>
        <button type="submit" id="addPlayerBtn"></button>
      </form>
    </div>

    <div class="card">
      <h2><span id="playersHeadingText"></span> (<span id="playerCount">0</span>)</h2>
      <table id="playersTable">
        <thead><tr><th id="thName"></th><th id="thLevel"></th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2 id="generateHeading"></h2>
      <p class="hint" id="generateHint"></p>
      <form id="generateForm" class="inline-form">
        <label><span id="courtsLabelText"></span> <input type="number" id="numCourts" min="1" value="2" required></label>
        <label><span id="roundsLabelText"></span> <input type="number" id="numRounds" min="1" value="3" required></label>
        <button type="submit" id="generateBtn"></button>
      </form>
    </div>

    <div class="card danger-card">
      <h2 id="resetHeading"></h2>
      <p class="hint" id="resetHint"></p>
      <button id="resetBtn" class="danger"></button>
    </div>
  </section>

  <!-- SCHEDULE TAB -->
  <section id="schedule" class="tab-panel">
    <div id="scheduleContent"></div>
  </section>

  <!-- RANKINGS TAB -->
  <section id="rankings" class="tab-panel">
    <div class="card">
      <table id="rankingsTable">
        <thead>
          <tr><th>#</th><th id="rankName"></th><th id="rankGames"></th><th id="rankSetsDiff"></th><th id="rankPointsDiff"></th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

</main>

<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
